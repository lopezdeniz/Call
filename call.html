<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice Call</title>
    <!-- Подключаем шрифт, похожий на San Francisco от Apple -->
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --apple-white: #FFFFFF;
            --apple-gray-light: #F2F2F7;
            --apple-gray: #8E8E93;
            --apple-gray-dark: #3A3A3C;
            --apple-blue: #007AFF;
            --apple-green: #34C759;
            --apple-red: #FF3B30;
            --apple-border: rgba(0, 0, 0, 0.05);
            --apple-text-dark: #000000;
            --apple-text-light: #F2F2F7;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--apple-gray-light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--apple-text-dark);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        .phone-mockup {
            width: 100%;
            height: 100%;
            max-width: 430px;
            background: var(--apple-white);
            border-radius: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--apple-border);
            position: relative;
        }

        /* Стартовый экран-заглушка (для разрешения аудио и микрофона) */
        #start-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--apple-white);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        #start-app-btn {
            padding: 16px 40px;
            background-color: var(--apple-blue);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
            transition: transform 0.1s;
            margin-top: 20px;
        }

        #start-app-btn:active { transform: scale(0.95); }

        /* Заголовок (Status Bar) */
        .status-bar {
            height: 50px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: var(--apple-text-dark);
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 100;
        }

        .call-info-panel {
            flex-grow: 1;
            padding: 60px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
        }

        #call-status-large { font-size: 24px; font-weight: 600; margin: 15px 0 5px; }
        #call-duration { font-size: 16px; color: var(--apple-gray); font-weight: 400; margin-bottom: 20px; }

        .controls { padding: 20px 0; display: flex; flex-direction: column; align-items: center; width: 100%; margin-top: auto; }
        .buttons-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; width: 100%; max-width: 320px; }

        .control-button { display: flex; flex-direction: column; align-items: center; justify-content: center; background: none; border: none; cursor: pointer; width: 100%; height: 90px; }
        .icon-circle { width: 65px; height: 65px; border-radius: 50%; background-color: var(--apple-gray-dark); color: var(--apple-text-light); display: flex; justify-content: center; align-items: center; margin-bottom: 8px; border: 2px solid transparent; transition: 0.2s; }
        .control-button.active .icon-circle { background-color: var(--apple-text-light); color: var(--apple-gray-dark); border-color: var(--apple-text-light); }
        
        .control-button.speaker .icon-circle { background-color: var(--apple-blue); color: var(--apple-text-light); }
        .control-button.speaker.active .icon-circle { background-color: var(--apple-white); color: var(--apple-blue); border-color: var(--apple-border); }
        .control-button span { font-size: 12px; font-weight: 400; color: var(--apple-gray); }

        #end-call-btn { width: 75px; height: 75px; border-radius: 50%; background-color: var(--apple-red); color: var(--apple-white); border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }

        #host-panel { display: none; flex-direction: column; align-items: center; width: 100%; position: absolute; bottom: 30px; padding: 0 20px; box-sizing: border-box; z-index: 50; }
        #host-link-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid var(--apple-border); padding: 20px; width: 100%; text-align: center; box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05); }
        #host-link-card p { margin: 0 0 15px; font-size: 16px; line-height: 1.4; color: var(--apple-gray-dark); }
        
        #share-link-input { width: 100%; padding: 12px; background: var(--apple-gray-light); border: 1px solid var(--apple-border); border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; text-align: center; font-size: 14px; color: var(--apple-blue); }
        #copy-link-btn { width: 100%; padding: 14px; background-color: var(--apple-blue); color: var(--apple-white); border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 600; }

        .icon { width: 30px; height: 30px; fill: currentColor; }

        #language-panel { position: absolute; top: 60px; left: 20px; right: 20px; display: none; justify-content: center; gap: 10px; z-index: 110; }
        .lang-button { padding: 8px 15px; background: var(--apple-gray-dark); color: var(--apple-text-light); border: none; border-radius: 15px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .lang-button.active { background-color: var(--apple-green); }

        #incoming-panel { position: absolute; top: 60px; left: 20px; right: 20px; background: var(--apple-white); border-radius: 20px; border: 1px solid var(--apple-border); padding: 20px; box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1); display: none; flex-direction: column; align-items: center; z-index: 120; }
    </style>
</head>
<body>

    <div class="phone-mockup">
        
        <!-- СТАРТОВЫЙ ЭКРАН (Решает проблемы с блокировкой звука браузером) -->
        <div id="start-screen">
            <h2 style="font-size: 28px; margin-bottom: 10px;">Voice Call</h2>
            <p id="start-desc" style="color: var(--apple-gray); margin-bottom: 10px;">Для работы приложения требуется микрофон.</p>
            <button id="start-app-btn">Начать звонок</button>
            <div id="language-panel-start" style="margin-top: 30px; display: flex; gap: 10px;">
                <button class="lang-button active" onclick="setLanguage('RU')">RU</button>
                <button class="lang-button" onclick="setLanguage('EN')">EN</button>
            </div>
        </div>

        <div class="status-bar">
            <span>Voice Call</span>
            <span id="call-duration-top" style="color: var(--apple-blue); display: none;">00:00</span>
        </div>

        <div id="incoming-panel">
            <div id="incoming-title" style="font-size: 20px; font-weight: 600;">Входящий вызов...</div>
            <p id="call-info" style="font-size: 14px; color: var(--apple-gray); margin-bottom: 10px;"></p>
        </div>

        <div class="call-info-panel">
            <div id="call-status-large">Подключение...</div>
            <div id="call-duration" style="display: none;">00:00</div>
            <div id="call-status-description" style="font-size: 14px; color: var(--apple-gray); margin-top: 5px;"></div>

            <div class="controls" id="active-controls" style="display: none;">
                <div class="buttons-grid">
                    <button class="control-button" id="mute-btn">
                        <div class="icon-circle">
                            <svg class="icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                        </div>
                        <span id="mute-label">Выкл. звук</span>
                    </button>
                    <div class="control-button" style="opacity: 0.3; cursor: default;">
                        <div class="icon-circle">
                            <svg class="icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-10 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
                        </div>
                        <span id="keypad-label">Клавиши</span>
                    </div>
                    <button class="control-button speaker" id="speaker-btn">
                        <div class="icon-circle">
                            <svg class="icon" viewBox="0 0 24 24"><path d="M18.17,4.89C17.78,4.5,17.15,4.5,16.76,4.89s-0.39,1.02,0,1.41C18.6,8.13,19,9.54,19,11s-0.4,2.87-1.24,4.7c-0.39,0.39-0.39,1.02,0,1.41s1.02,0.39,1.41,0C20.35,15.74,21,13.8,21,11S20.35,6.26,18.17,4.89z M12,4c-1.1,0-2,0.9-2,2v12c0,1.1,0.9,2,2,2c1.1,0,2-0.9,2-2V6C14,4.9,13.1,4,12,4z M13.88,10.66C13.8,10.2,13.43,10,13,10h-2c-0.43,0-0.8,0.2-0.88,0.66C10.05,10.98,10.3,11.2,10.53,11.36C10.68,11.45,10.84,11.53,11,11.6c0.05,0.02,0.1,0.04,0.15,0.06C11.33,11.75,11.5,11.83,11.67,11.9c0.11,0.05,0.22,0.09,0.33,0.14c0.23,0.1,0.47,0.19,0.7,0.27l0.01,0.01c0.05,0.02,0.09,0.04,0.14,0.06c0.16,0.06,0.32,0.12,0.48,0.17l0.01,0c0.16,0.05,0.32,0.1,0.48,0.14c0.15,0.04,0.3,0.08,0.46,0.11l0.01,0C13.68,12.87,13.85,12.93,14,13V6.26l-0.12,0.4C13.88,10.66z M16.76,17.7c0.39,0.39,1.02,0.39,1.41,0c1.11-1.11,1.83-2.61,1.83-4.7c0-2.09-0.72-3.59-1.83-4.7c-0.39-0.39-1.02-0.39-1.41,0c-0.39,0.39-0.39,1.02,0,1.41c0.75,0.75,1.24,1.74,1.24,3.29c0,1.55-0.49,2.54-1.24,3.29C16.36,16.68,16.36,17.3,16.76,17.7z"/></svg>
                        </div>
                        <span id="speaker-label">Динамик</span>
                    </button>
                </div>
                <button id="end-call-btn">
                    <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg>
                </button>
            </div>
        </div>

        <div id="host-panel">
            <div id="host-link-card">
                <p id="host-title">Пригласите собеседника:</p>
                <input type="text" id="share-link-input" readonly>
                <button id="copy-link-btn" onclick="copyLink()">Скопировать ссылку</button>
            </div>
        </div>

        <audio id="remote-audio-earpiece" autoplay></audio>
        <audio id="remote-audio-speaker" autoplay></audio>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <script>
        // ИСПРАВЛЕНИЕ: Словарь теперь глобальный, код не будет падать при доступе к нему
        const uiStrings = {
            RU: {
                startDesc: "Нажмите кнопку ниже, чтобы разрешить использование микрофона и начать.",
                btnStart: "Начать звонок",
                micReq: "Запрашиваем микрофон...",
                micError: "Ошибка! Разрешите микрофон в настройках браузера.",
                serverConnect: "Связь с сервером...",
                hostWaiting: "Пригласите собеседника:",
                hostCopy: "Скопировать ссылку",
                callConnected: "Входящий вызов...",
                autoConnect: "Соединение...",
                activeCall: "Разговор идет",
                callEnd: "Завершен.",
                btnMute: "Выкл. звук",
                btnMuted: "Вкл. звук",
                btnSpeaker: "Динамик",
                keypad: "Клавиши",
                callStartedAt: "Начат: ",
                waitingForPeer: "Ожидание..."
            },
            EN: {
                startDesc: "Tap the button below to allow microphone access and start.",
                btnStart: "Start Call",
                micReq: "Requesting microphone...",
                micError: "Error! Enable mic in browser settings.",
                serverConnect: "Connecting to server...",
                hostWaiting: "Invite participant:",
                hostCopy: "Copy link",
                callConnected: "Incoming call...",
                autoConnect: "Connecting...",
                activeCall: "On call",
                callEnd: "Ended.",
                btnMute: "Mute",
                btnMuted: "Unmute",
                btnSpeaker: "Speaker",
                keypad: "Keypad",
                callStartedAt: "Started at: ",
                waitingForPeer: "Waiting..."
            }
        };

        const startScreen = document.getElementById('start-screen');
        const startAppBtn = document.getElementById('start-app-btn');
        const callStatusLarge = document.getElementById('call-status-large');
        const callStatusDescription = document.getElementById('call-status-description');
        const callDurationDisplay = document.getElementById('call-duration');
        const callDurationTopDisplay = document.getElementById('call-duration-top');
        const remoteAudioEarpiece = document.getElementById('remote-audio-earpiece');
        const remoteAudioSpeaker = document.getElementById('remote-audio-speaker');
        const hostPanel = document.getElementById('host-panel');
        const shareLinkInput = document.getElementById('share-link-input');
        const activeControls = document.getElementById('active-controls');
        const muteBtn = document.getElementById('mute-btn');
        const muteLabel = document.getElementById('mute-label');
        const speakerBtn = document.getElementById('speaker-btn');
        const speakerLabel = document.getElementById('speaker-label');
        const endCallBtn = document.getElementById('end-call-btn');
        const incomingPanel = document.getElementById('incoming-panel');
        const callInfo = document.getElementById('call-info');

        let localStream;
        let currentPeer;
        let currentCall;
        let isMuted = false;
        let isSpeaker = false;
        let callStartTime;
        let durationInterval;

        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('call');

        let currentLanguage = 'RU';

        function setLanguage(lang) {
            currentLanguage = lang;
            document.querySelectorAll('.lang-button').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.lang-button[onclick="setLanguage('${lang}')"]`).classList.add('active');
            updateUIStrings();
        }

        function updateUIStrings() {
            const s = uiStrings[currentLanguage];
            document.getElementById('start-desc').innerText = s.startDesc;
            startAppBtn.innerText = s.btnStart;
            document.getElementById('host-title').innerText = s.hostWaiting;
            document.getElementById('copy-link-btn').innerText = s.hostCopy;
            document.getElementById('incoming-title').innerText = s.callConnected;
            muteLabel.innerText = isMuted ? s.btnMuted : s.btnMute;
            speakerLabel.innerText = s.btnSpeaker;
            document.getElementById('keypad-label').innerText = s.keypad;
            
            if(targetId && !currentCall && startScreen.style.display !== 'none') {
                startAppBtn.innerText = "Присоединиться";
            }
        }

        // Применяем язык на старте
        updateUIStrings();

        // Главный триггер: пользователь нажимает "Начать"
        startAppBtn.addEventListener('click', () => {
            startScreen.style.display = 'none'; // Убираем стартовый экран
            callStatusDescription.innerText = uiStrings[currentLanguage].micReq;

            // Запрашиваем микрофон только ПОСЛЕ клика
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                .then(stream => {
                    localStream = stream;
                    callStatusDescription.innerText = uiStrings[currentLanguage].serverConnect;
                    initPeer();
                })
                .catch(err => {
                    callStatusLarge.innerText = "Ошибка";
                    callStatusDescription.innerText = uiStrings[currentLanguage].micError;
                    console.error("Mic error:", err);
                });
        });

        function initPeer() {
            currentPeer = new Peer();

            currentPeer.on('open', myId => {
                if (targetId) {
                    callStatusLarge.innerText = uiStrings[currentLanguage].autoConnect;
                    callStatusDescription.innerText = "";
                    const call = currentPeer.call(targetId, localStream);
                    handleCall(call);
                } else {
                    callStatusLarge.innerText = uiStrings[currentLanguage].waitingForPeer;
                    callStatusDescription.innerText = "";
                    const link = window.location.origin + window.location.pathname + '?call=' + myId;
                    shareLinkInput.value = link;
                    hostPanel.style.display = 'flex';
                }
            });

            currentPeer.on('call', call => {
                incomingPanel.style.display = 'flex';
                callStatusLarge.innerText = uiStrings[currentLanguage].callConnected;
                callStatusDescription.innerText = "";
                callInfo.innerText = uiStrings[currentLanguage].callStartedAt + new Date().toLocaleTimeString();
                
                call.answer(localStream);
                handleCall(call);
                hostPanel.style.display = 'none';
            });
        }

        function handleCall(call) {
            currentCall = call;
            activeControls.style.display = 'flex';
            incomingPanel.style.display = 'none';
            callStatusLarge.innerText = uiStrings[currentLanguage].activeCall;
            callDurationDisplay.style.display = 'block';
            callDurationTopDisplay.style.display = 'block';
            
            callStartTime = Date.now();
            updateCallDuration();
            durationInterval = setInterval(updateCallDuration, 1000);

            call.on('stream', remoteStream => {
                remoteAudioEarpiece.srcObject = remoteStream;
                remoteAudioSpeaker.srcObject = remoteStream;
                setSpeaker(isSpeaker);
            });

            call.on('close', endCallUI);
        }

        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            if(localStream) {
                localStream.getAudioTracks()[0].enabled = !isMuted;
            }
            muteBtn.classList.toggle('active', isMuted);
            updateUIStrings();
        });

        speakerBtn.addEventListener('click', () => {
            isSpeaker = !isSpeaker;
            setSpeaker(isSpeaker);
            speakerBtn.classList.toggle('active', isSpeaker);
        });

        function setSpeaker(speaker) {
            if (speaker) {
                remoteAudioEarpiece.volume = 0;
                remoteAudioSpeaker.volume = 1;
            } else {
                remoteAudioEarpiece.volume = 1;
                remoteAudioSpeaker.volume = 0;
            }
        }

        endCallBtn.addEventListener('click', () => {
            if (currentCall) currentCall.close();
            if (currentPeer) currentPeer.destroy();
            endCallUI();
        });

        function updateCallDuration() {
            const diff = Date.now() - callStartTime;
            const minutes = Math.floor(diff / 60000).toString().padStart(2, '0');
            const seconds = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            const duration = `${minutes}:${seconds}`;
            callDurationDisplay.innerText = duration;
            callDurationTopDisplay.innerText = duration;
        }

        function endCallUI() {
            activeControls.style.display = 'none';
            clearInterval(durationInterval);
            callStatusLarge.innerText = uiStrings[currentLanguage].callEnd;
            callDurationDisplay.style.display = 'none';
            callDurationTopDisplay.style.display = 'none';
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        function copyLink() {
            shareLinkInput.select();
            navigator.clipboard.writeText(shareLinkInput.value)
                .then(() => alert(uiStrings[currentLanguage].hostCopy + " ✓"))
                .catch(err => alert("Ошибка копирования."));
        }
    </script>
</body>
</html>
